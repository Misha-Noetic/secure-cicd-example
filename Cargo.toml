[package]
name = "secure-api"
version = "0.1.0"
edition = "2021"
description = "Example Rust API with CI/CD security scanning"

[dependencies]
actix-web = "4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
rusqlite = { version = "0.31", features = ["bundled"] }
md-5 = "0.10"
log = "0.4"
env_logger = "0.11"

# INTENTIONALLY VULNERABLE — pinned to old version for demo purposes
# regex 1.5.4 has CVE-2022-24713 (ReDoS), fixed in 1.5.5+
regex = "1.5.5"

# Dependencies for expanded vulnerability test suite (vulns 10-23)
actix-cors = "0.7"
jsonwebtoken = "8"
serde_yaml = "0.9"
