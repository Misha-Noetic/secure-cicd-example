[package]
name = "secure-api"
version = "0.1.0"
edition = "2021"
description = "Example Rust API with CI/CD security scanning"

[dependencies]
actix-web = "4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

# INTENTIONALLY VULNERABLE — pinned to old version for demo purposes
# h2 0.3.17 has CVE-2024-2653 (HTTP/2 CONTINUATION flood), fixed in 0.3.26+
h2 = "=0.3.17"
