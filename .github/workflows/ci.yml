name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new push arrives on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  security-events: write  # Required for Clippy SARIF upload to Security tab

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry, build & binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install SARIF tools
        run: cargo install clippy-sarif sarif-fmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Single clippy run: pipefail propagates exit code through the pipe,
      # so -D warnings fails the step while still producing SARIF output
      - name: Run Clippy (linter + SARIF)
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features --message-format=json -- -D warnings \
            | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt

      - name: Upload Clippy SARIF to Security tab
        if: always() && hashFiles('rust-clippy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@9792ccaef0455e446c567163589397e8c3ac2e0d  # v3
        with:
          sarif_file: rust-clippy-results.sarif
          wait-for-processing: true

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --verbose

  # Rust-specific security advisory check (RustSec database)
  cargo-audit:
    name: Cargo Audit (RustSec)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable

      - name: Cache cargo binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-bin-audit

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run cargo-audit
        run: cargo audit
