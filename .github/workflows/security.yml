name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'  # Every day at 7 AM UTC

# Cancel in-progress runs for PRs only — never cancel scheduled security scans
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write  # Required to upload SARIF results to GitHub Security tab

jobs:
  # ─────────────────────────────────────────────
  # Job 1: TruffleHog — Secret Detection
  # Scans git history and code for leaked secrets
  # (API keys, passwords, tokens, private keys)
  # ─────────────────────────────────────────────
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0  # Full history so TruffleHog can scan all commits

      # Skip scan if BASE and HEAD are identical (e.g. GitHub UI edits on PRs)
      # Uses env: block to avoid direct expression interpolation in run:
      - name: Check for scannable commit range
        if: github.event_name == 'pull_request'
        id: commit-check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$BASE_SHA" = "$HEAD_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "BASE and HEAD are identical — nothing to scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Step 1: Built-in detectors (800+ patterns for known services)
      - name: TruffleHog — built-in detectors
        if: steps.commit-check.outputs.skip != 'true'
        uses: trufflesecurity/trufflehog@a2a17cd73d74376209d6323c80a9a55b424e25b0  # v3.88.12
        with:
          extra_args: --no-verification --exclude-paths=.trufflehog-exclude.txt

      # Step 2: Custom detectors (org-specific patterns from .trufflehog.yml)
      # Runs separately because --config may disable built-in detectors
      - name: TruffleHog — custom org detectors
        if: steps.commit-check.outputs.skip != 'true'
        uses: trufflesecurity/trufflehog@a2a17cd73d74376209d6323c80a9a55b424e25b0  # v3.88.12
        with:
          extra_args: --no-verification --config=.trufflehog.yml --exclude-paths=.trufflehog-exclude.txt

  # ─────────────────────────────────────────────
  # Job 2: Trivy — Filesystem / Dependency Scan
  # Scans Cargo.toml/Cargo.lock for known CVEs
  # in Rust crate dependencies
  # ─────────────────────────────────────────────
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      # GATE: Block on fixable CRITICAL/HIGH vulnerabilities
      - name: "GATE: Fixable CRITICAL/HIGH vulnerabilities"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      # WARN: Report all vulnerabilities (including unfixed) — never blocks
      - name: "WARN: All vulnerabilities (including unfixed)"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          exit-code: 0

      # SARIF steps — only run on public repos (requires GitHub Advanced Security on private)
      - name: Generate SARIF for GitHub Security tab
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        if: always() && github.repository_visibility == 'public'
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-fs-results.sarif

      - name: Upload Trivy FS results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@9792ccaef0455e446c567163589397e8c3ac2e0d  # v3
        if: always() && github.repository_visibility == 'public' && hashFiles('trivy-fs-results.sarif') != ''
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem
          wait-for-processing: true

  # ─────────────────────────────────────────────
  # Job 3: Trivy — Docker Image Scan
  # Builds the container image, then scans it for
  # OS-level and application-level vulnerabilities
  # ─────────────────────────────────────────────
  trivy-image:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    # Only build + scan the Docker image on pushes to main and scheduled runs (skip PRs)
    if: (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build Docker image (with layer cache)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          load: true
          tags: secure-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GATE: Block on fixable CRITICAL/HIGH vulnerabilities
      - name: "GATE: Fixable CRITICAL/HIGH vulnerabilities"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          image-ref: secure-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      # WARN: Report all vulnerabilities (including unfixed) — never blocks
      - name: "WARN: All vulnerabilities (including unfixed)"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        if: always()
        with:
          image-ref: secure-api:${{ github.sha }}
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          exit-code: 0

      # SARIF steps — only run on public repos (requires GitHub Advanced Security on private)
      # Use always() — when the GATE step fails (vulnerabilities found), we still
      # want SARIF uploaded so findings appear in the GitHub Security tab
      - name: Generate SARIF for GitHub Security tab
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        if: always() && github.repository_visibility == 'public'
        with:
          image-ref: secure-api:${{ github.sha }}
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-image-results.sarif

      - name: Upload Trivy image results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@9792ccaef0455e446c567163589397e8c3ac2e0d  # v3
        if: always() && github.repository_visibility == 'public' && hashFiles('trivy-image-results.sarif') != ''
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-docker-image
          wait-for-processing: true

      # Generate SBOM — full inventory of everything in the image
      # CycloneDX format for Dependency-Track compatibility
      - name: Generate SBOM (CycloneDX format)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        if: always()
        with:
          image-ref: secure-api:${{ github.sha }}
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM as build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always() && hashFiles('sbom.cdx.json') != ''
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90

      # Upload SBOM to Dependency-Track for continuous monitoring
      # Requires DEPENDENCY_TRACK_URL and DEPENDENCY_TRACK_API_KEY secrets
      - name: Upload SBOM to Dependency-Track
        continue-on-error: true  # Non-blocking — DT may not be configured yet
        if: always() && hashFiles('sbom.cdx.json') != '' && env.DT_API_KEY != ''
        env:
          DT_API_KEY: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          DT_URL: ${{ secrets.DEPENDENCY_TRACK_URL }}
        run: |
          BOM_BASE64=$(base64 -w0 sbom.cdx.json)
          cat > /tmp/dt-payload.json << EOF
          {"projectName":"${{ github.event.repository.name }}","projectVersion":"${{ github.sha }}","autoCreate":true,"bom":"${BOM_BASE64}"}
          EOF
          curl -sf -X PUT "${DT_URL}/api/v1/bom" \
            -H "X-Api-Key: ${DT_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @/tmp/dt-payload.json
          echo "SBOM uploaded to Dependency-Track"

  # ─────────────────────────────────────────────
  # Job 4: Notify — Slack alert on security failures
  # Runs ONLY when a scan job fails (secret found, fixable CVE, etc.)
  # Set up:
  #   1. Create a Slack Incoming Webhook: https://api.slack.com/messaging/webhooks
  #   2. Add it as a GitHub repo secret named SLACK_SECURITY_WEBHOOK_URL
  #   3. That's it — this job handles the rest
  # ─────────────────────────────────────────────
  notify-slack:
    name: Slack Security Alert
    runs-on: ubuntu-latest
    # Only run when a scan failed
    if: >-
      always()
      && (needs.trufflehog.result == 'failure' || needs.trivy-fs.result == 'failure' || needs.trivy-image.result == 'failure')
    needs: [trufflehog, trivy-fs, trivy-image]

    steps:
      # Build the Slack payload with jq to prevent JSON injection from
      # attacker-controlled values like branch names (github.ref_name)
      - name: Build Slack payload
        if: env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_SECURITY_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRUFFLEHOG_RESULT: ${{ needs.trufflehog.result }}
          TRIVY_FS_RESULT: ${{ needs.trivy-fs.result }}
          TRIVY_IMAGE_RESULT: ${{ needs.trivy-image.result }}
        run: |
          trufflehog_status="✅ Clean"
          [ "$TRUFFLEHOG_RESULT" = "failure" ] && trufflehog_status="❌ Secrets found!"
          trivy_fs_status="✅ Clean"
          [ "$TRIVY_FS_RESULT" = "failure" ] && trivy_fs_status="❌ Fixable CVEs!"
          trivy_image_status="✅ Clean"
          [ "$TRIVY_IMAGE_RESULT" = "failure" ] && trivy_image_status="❌ Fixable CVEs!"
          [ "$TRIVY_IMAGE_RESULT" = "skipped" ] && trivy_image_status="⏭️ Skipped (PR)"

          jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg event "$EVENT" \
            --arg run_url "$RUN_URL" \
            --arg th "$trufflehog_status" \
            --arg tfs "$trivy_fs_status" \
            --arg ti "$trivy_image_status" \
            '{
              text: "🚨 Security scan failed in *\($repo)*",
              blocks: [
                { type: "header", text: { type: "plain_text", text: "🚨 Security Scan Failed" } },
                { type: "section", fields: [
                    { type: "mrkdwn", text: "*Repository:*\n\($repo)" },
                    { type: "mrkdwn", text: "*Branch:*\n\($branch)" },
                    { type: "mrkdwn", text: "*Triggered by:*\n\($actor)" },
                    { type: "mrkdwn", text: "*Event:*\n\($event)" }
                ]},
                { type: "section", fields: [
                    { type: "mrkdwn", text: "*TruffleHog:*\n\($th)" },
                    { type: "mrkdwn", text: "*Trivy FS:*\n\($tfs)" },
                    { type: "mrkdwn", text: "*Trivy Image:*\n\($ti)" }
                ]},
                { type: "actions", elements: [
                    { type: "button", text: { type: "plain_text", text: "View Workflow Run" }, url: $run_url }
                ]}
              ]
            }' > /tmp/slack-payload.json

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d  # v2.0.0
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_SECURITY_WEBHOOK_URL }}
        with:
          webhook: ${{ secrets.SLACK_SECURITY_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
