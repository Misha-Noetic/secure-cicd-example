name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new push arrives on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # Required to upload SARIF results to GitHub Security tab

jobs:
  # ─────────────────────────────────────────────
  # Job 1: TruffleHog — Secret Detection
  # Scans git history and code for leaked secrets
  # (API keys, passwords, tokens, private keys)
  # ─────────────────────────────────────────────
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so TruffleHog can scan all commits

      # Full scan on pushes to main (catches anything in history)
      - name: TruffleHog full scan
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --no-verification

      # Incremental scan on PRs (only new commits — much faster on large repos)
      - name: TruffleHog PR scan (new commits only)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --no-verification --since-commit=${{ github.event.pull_request.base.sha }}

  # ─────────────────────────────────────────────
  # Job 2: Trivy — Filesystem / Dependency Scan
  # Scans Cargo.toml/Cargo.lock for known CVEs
  # in Rust crate dependencies
  # ─────────────────────────────────────────────
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      # GATE: Block on fixable CRITICAL/HIGH vulnerabilities
      - name: "GATE: Fixable CRITICAL/HIGH vulnerabilities"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      # WARN: Report all vulnerabilities (including unfixed) — never blocks
      - name: "WARN: All vulnerabilities (including unfixed)"
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          exit-code: 0

      # SARIF steps — only run on public repos (requires GitHub Advanced Security on private)
      - name: Generate SARIF for GitHub Security tab
        uses: aquasecurity/trivy-action@master
        if: always() && github.repository_visibility == 'public'
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-fs-results.sarif

      - name: Upload Trivy FS results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.repository_visibility == 'public' && hashFiles('trivy-fs-results.sarif') != ''
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  # ─────────────────────────────────────────────
  # Job 3: Trivy — Docker Image Scan
  # Builds the container image, then scans it for
  # OS-level and application-level vulnerabilities
  # ─────────────────────────────────────────────
  trivy-image:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    # Only build + scan the Docker image on merges to main (saves ~15 min on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secure-api:${{ github.sha }} .

      # GATE: Block on fixable CRITICAL/HIGH vulnerabilities
      - name: "GATE: Fixable CRITICAL/HIGH vulnerabilities"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      # WARN: Report all vulnerabilities (including unfixed) — never blocks
      - name: "WARN: All vulnerabilities (including unfixed)"
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: secure-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: table
          exit-code: 0

      # SARIF steps — only run on public repos (requires GitHub Advanced Security on private)
      - name: Generate SARIF for GitHub Security tab
        uses: aquasecurity/trivy-action@master
        if: success() && github.repository_visibility == 'public'
        with:
          image-ref: secure-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-image-results.sarif

      - name: Upload Trivy image results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.repository_visibility == 'public' && hashFiles('trivy-image-results.sarif') != ''
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-docker-image
