name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'  # Every day at 7 AM UTC

# Cancel in-progress runs when a new push arrives on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # Required to upload SARIF results to GitHub Security tab

jobs:
  # ─────────────────────────────────────────────
  # Job 1: TruffleHog — Secret Detection
  # Scans git history and code for leaked secrets
  # (API keys, passwords, tokens, private keys)
  # ─────────────────────────────────────────────
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so TruffleHog can scan all commits

      # Skip scan if BASE and HEAD are identical (e.g. GitHub UI edits on PRs)
      - name: Check for scannable commit range
        if: github.event_name == 'pull_request'
        id: commit-check
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if [ "$BASE" = "$HEAD" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "BASE and HEAD are identical — nothing to scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Step 1: Built-in detectors (800+ patterns for known services)
      - name: TruffleHog — built-in detectors
        if: steps.commit-check.outputs.skip != 'true'
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --no-verification --exclude-paths=.trufflehog-exclude.txt

      # Step 2: Custom detectors (org-specific patterns from .trufflehog.yml)
      # Runs separately because --config may disable built-in detectors
      - name: TruffleHog — custom org detectors
        if: steps.commit-check.outputs.skip != 'true'
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --no-verification --config=.trufflehog.yml --exclude-paths=.trufflehog-exclude.txt

  # ─────────────────────────────────────────────
  # Job 2: Trivy — Filesystem / Dependency Scan
  # Scans Cargo.toml/Cargo.lock for known CVEs
  # in Rust crate dependencies
  # ─────────────────────────────────────────────
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      # GATE: Block on fixable CRITICAL/HIGH vulnerabilities
      - name: "GATE: Fixable CRITICAL/HIGH vulnerabilities"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      # WARN: Report all vulnerabilities (including unfixed) — never blocks
      - name: "WARN: All vulnerabilities (including unfixed)"
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          exit-code: 0

      # SARIF steps — only run on public repos (requires GitHub Advanced Security on private)
      - name: Generate SARIF for GitHub Security tab
        uses: aquasecurity/trivy-action@master
        if: always() && github.repository_visibility == 'public'
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-fs-results.sarif

      - name: Upload Trivy FS results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.repository_visibility == 'public' && hashFiles('trivy-fs-results.sarif') != ''
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  # ─────────────────────────────────────────────
  # Job 3: Trivy — Docker Image Scan
  # Builds the container image, then scans it for
  # OS-level and application-level vulnerabilities
  # ─────────────────────────────────────────────
  trivy-image:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    # Only build + scan the Docker image on pushes to main and scheduled runs (skip PRs)
    if: (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: secure-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GATE: Block on fixable CRITICAL/HIGH vulnerabilities
      - name: "GATE: Fixable CRITICAL/HIGH vulnerabilities"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      # WARN: Report all vulnerabilities (including unfixed) — never blocks
      - name: "WARN: All vulnerabilities (including unfixed)"
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: secure-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: table
          exit-code: 0

      # SARIF steps — only run on public repos (requires GitHub Advanced Security on private)
      - name: Generate SARIF for GitHub Security tab
        uses: aquasecurity/trivy-action@master
        if: success() && github.repository_visibility == 'public'
        with:
          image-ref: secure-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-image-results.sarif

      - name: Upload Trivy image results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.repository_visibility == 'public' && hashFiles('trivy-image-results.sarif') != ''
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-docker-image

      # Generate SBOM — full inventory of everything in the image
      - name: Generate SBOM (SPDX format)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: secure-api:${{ github.sha }}
          format: spdx-json
          output: sbom.spdx.json

      - name: Upload SBOM as build artifact
        uses: actions/upload-artifact@v7
        if: always() && hashFiles('sbom.spdx.json') != ''
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90

  # ─────────────────────────────────────────────
  # Job 4: Notify — Slack alert on security failures
  # Runs ONLY when a scan job fails (secret found, fixable CVE, etc.)
  # Set up:
  #   1. Create a Slack Incoming Webhook: https://api.slack.com/messaging/webhooks
  #   2. Add it as a GitHub repo secret named SLACK_SECURITY_WEBHOOK_URL
  #   3. That's it — this job handles the rest
  # ─────────────────────────────────────────────
  notify-slack:
    name: Slack Security Alert
    runs-on: ubuntu-latest
    # Only run when a scan failed
    if: >-
      always()
      && (needs.trufflehog.result == 'failure' || needs.trivy-fs.result == 'failure' || needs.trivy-image.result == 'failure')
    needs: [trufflehog, trivy-fs, trivy-image]

    steps:
      - name: Send Slack notification
        # Skip if the webhook secret isn't configured (secrets aren't available in job-level if)
        if: env.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v2.0.0
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_SECURITY_WEBHOOK_URL }}
        with:
          webhook: https://hooks.slack.com/services/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
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 Security scan failed in *${{ github.repository }}*",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 Security Scan Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Event:*\n${{ github.event_name }}" }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*TruffleHog:*\n${{ needs.trufflehog.result == 'failure' && '❌ Secrets found!' || '✅ Clean' }}" },
                    { "type": "mrkdwn", "text": "*Trivy FS:*\n${{ needs.trivy-fs.result == 'failure' && '❌ Fixable CVEs!' || '✅ Clean' }}" },
                    { "type": "mrkdwn", "text": "*Trivy Image:*\n${{ needs.trivy-image.result == 'failure' && '❌ Fixable CVEs!' || needs.trivy-image.result == 'skipped' && '⏭️ Skipped (PR)' || '✅ Clean' }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
