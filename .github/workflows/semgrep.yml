name: Semgrep SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC

# Cancel in-progress runs when a new push arrives on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # Required for SARIF upload

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    # Skip Dependabot PRs (avoids permission issues)
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Platform mode: blocking policies + AI triage ──
      # IMPORTANT: `semgrep ci` with SEMGREP_APP_TOKEN must run WITHOUT --config
      # or SEMGREP_RULES — those flags override platform-managed rules and break
      # blocking policies. Custom rules are published to the platform registry
      # via the semgrep-publish.yml workflow and managed in Policies there.
      - name: Run Semgrep (platform)
        if: env.SEMGREP_APP_TOKEN != ''
        run: |
          echo "Running with Semgrep AppSec Platform (blocking policies active)"
          echo "Custom rules are managed via platform Policies (published by semgrep-publish.yml)"
          semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # ── Standalone fallback (no platform token) ──
      # Uses public rulesets + local custom rules when SEMGREP_APP_TOKEN is not
      # set (e.g. forks, first-time setup). Outputs SARIF for GitHub Security tab.
      - name: Run Semgrep (standalone fallback)
        if: env.SEMGREP_APP_TOKEN == ''
        run: |
          echo "Running standalone (no platform token — using default + Rust + custom rulesets)"
          semgrep ci --config auto --config p/rust --config .semgrep/rules/ --sarif -o semgrep-results.sarif || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # Upload SARIF to GitHub Security tab (standalone mode only —
      # platform mode handles this automatically)
      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
