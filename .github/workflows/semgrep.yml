name: Semgrep SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC

# Cancel in-progress runs when a new push arrives on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # Required for SARIF upload

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    # Skip Dependabot PRs (avoids permission issues)
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 1: Platform scan (blocking policies, Assistant AI triage) ──
      # IMPORTANT: `semgrep ci` with SEMGREP_APP_TOKEN must run WITHOUT --config
      # or SEMGREP_RULES — those flags override platform-managed rules and break
      # blocking policies. The platform manages its own rulesets and decides
      # pass/fail based on your configured policies.
      - name: Run Semgrep (platform rules)
        if: env.SEMGREP_APP_TOKEN != ''
        run: |
          echo "Running with Semgrep AppSec Platform (blocking policies active)"
          semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # ── Step 2: Custom local rules (always runs, informational) ──
      # Runs our repo-specific Rust security rules from .semgrep/rules/.
      # Outputs SARIF for the GitHub Security tab. Does not block the pipeline
      # (that's the platform's job above). Runs even if step 1 fails.
      - name: Run Semgrep (custom rules)
        if: always() && github.actor != 'dependabot[bot]'
        run: |
          echo "Running custom Rust security rules from .semgrep/rules/"
          semgrep scan --config .semgrep/rules/ --sarif -o semgrep-custom.sarif || true

      # ── Fallback: standalone mode (no platform token) ──
      # Uses public rulesets + custom rules when SEMGREP_APP_TOKEN is not set.
      - name: Run Semgrep (standalone fallback)
        if: env.SEMGREP_APP_TOKEN == ''
        run: |
          echo "Running standalone (no platform token — using default + Rust + custom rulesets)"
          semgrep ci --config auto --config p/rust --config .semgrep/rules/ --sarif -o semgrep-results.sarif || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # Upload SARIF to GitHub Security tab
      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-custom.sarif
          category: semgrep-custom
        continue-on-error: true

      - name: Upload standalone SARIF to GitHub Security tab
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
