name: Semgrep SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC

# Cancel in-progress runs for PRs only — never cancel scheduled scans
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write  # Required for SARIF upload

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    # Skip Dependabot PRs (avoids permission issues)
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # ── Step 1: Platform scan (blocking policies) ──
      # IMPORTANT: `semgrep ci` with SEMGREP_APP_TOKEN must run WITHOUT --config
      # or SEMGREP_RULES — those flags override platform-managed rules and break
      # blocking policies. On Team tier, use semgrep-publish.yml to push custom
      # rules to the platform. On free tier, custom rules run separately below.
      - name: Run Semgrep (platform rules)
        if: env.SEMGREP_APP_TOKEN != ''
        run: |
          echo "Running with Semgrep AppSec Platform (blocking policies active)"
          semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # Validate custom rules before scanning
      - name: Validate custom rules
        if: always() && github.actor != 'dependabot[bot]'
        run: semgrep scan --validate --metrics=off --config .semgrep/rules/ 2>&1

      # ── Step 2: Custom local rules (blocking) ──
      # Runs repo-specific Rust security rules from .semgrep/rules/.
      # Outputs SARIF for the GitHub Security tab. Also blocks on findings.
      # Runs even if step 1 fails.
      # Exit 0 = no findings, exit 1 = findings (expected for vulnerable.rs),
      # exit >1 = crash/config error. Tolerate 0 and 1; fail on crashes.
      - name: Run Semgrep (custom rules — SARIF for Security tab)
        if: always() && github.actor != 'dependabot[bot]'
        run: |
          set +e
          semgrep scan --metrics=off --config .semgrep/rules/ --verbose --sarif -o semgrep-custom.sarif 2>&1; rc=$?
          set -e
          echo "Semgrep custom rules exited with code $rc"
          if [ $rc -gt 1 ]; then echo "Semgrep error (exit $rc)"; exit $rc; fi

      # ── Standalone fallback (no platform token) ──
      # Uses public rulesets + local custom rules when SEMGREP_APP_TOKEN is not
      # set (e.g. forks, first-time setup). Outputs SARIF for GitHub Security tab.
      # NOTE: Uses `semgrep scan` (not `semgrep ci`) because `semgrep ci` requires
      # a platform token and does not support --sarif / -o flags.
      - name: Run Semgrep (standalone fallback)
        if: env.SEMGREP_APP_TOKEN == ''
        run: |
          set +e
          semgrep scan --metrics=off --config auto --config p/rust --config .semgrep/rules/ --sarif -o semgrep-results.sarif; rc=$?
          set -e
          if [ $rc -gt 1 ]; then echo "Semgrep error (exit $rc)"; exit $rc; fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # Upload custom rules SARIF to GitHub Security tab
      - name: Upload custom rules SARIF
        if: always() && hashFiles('semgrep-custom.sarif') != ''
        uses: github/codeql-action/upload-sarif@9792ccaef0455e446c567163589397e8c3ac2e0d  # v3
        with:
          sarif_file: semgrep-custom.sarif
          category: semgrep-custom
          wait-for-processing: true

      # Upload standalone SARIF to GitHub Security tab
      - name: Upload standalone SARIF
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@9792ccaef0455e446c567163589397e8c3ac2e0d  # v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
          wait-for-processing: true
