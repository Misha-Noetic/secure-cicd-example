name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run weekly even without pushes — catches new query rules
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC

# Cancel in-progress runs when a new push arrives on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # Required to upload SARIF results

jobs:
  codeql:
    name: CodeQL Scan
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # CodeQL supports: c-cpp, csharp, go, java-kotlin,
        # javascript-typescript, python, ruby, rust, swift
        language: [rust]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Initialize CodeQL tools and create a database for analysis
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # build-mode: none — Rust is analyzed without building (source-level analysis)
          # CodeQL extracts the code structure directly from source files
          build-mode: none

          # security-extended — more security queries beyond the default set
          queries: +security-extended

      # Run CodeQL analysis and upload results
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Results automatically appear in:
          #   - GitHub Security tab → Code scanning alerts
          #   - Pull request annotations (inline comments on vulnerable lines)
