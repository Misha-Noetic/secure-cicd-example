rules:
  # Cookie::new() without builder — can't set Secure flag via chaining
  - id: rust-cookie-new-audit
    languages: [rust]
    severity: WARNING
    message: >
      Cookie::new() creates a cookie without security attributes. Use
      Cookie::build() with .secure(true) and .http_only(true) instead, or
      call .set_secure(true) on the returned cookie.
    metadata:
      confidence: MEDIUM
      category: security
      cwe:
        - "CWE-614: Sensitive Cookie in HTTPS Session Without 'Secure' Attribute"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      technology:
        - rust
      likelihood: MEDIUM
      impact: MEDIUM
      subcategory:
        - audit
      references:
        - https://owasp.org/Top10/A05_2021-Security_Misconfiguration/
    pattern: Cookie::new(...)

  # Cookie::build() chain that calls .finish() without .secure(true)
  - id: rust-cookie-build-missing-secure
    languages: [rust]
    severity: WARNING
    message: >
      Cookie built without .secure(true). Set .secure(true) to prevent
      transmission over unencrypted connections, and .http_only(true) to
      prevent JavaScript access.
    metadata:
      confidence: HIGH
      category: security
      cwe:
        - "CWE-614: Sensitive Cookie in HTTPS Session Without 'Secure' Attribute"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      technology:
        - rust
      likelihood: MEDIUM
      impact: MEDIUM
      subcategory:
        - vuln
      references:
        - https://owasp.org/Top10/A05_2021-Security_Misconfiguration/
    patterns:
      - pattern: Cookie::build(...). ... .finish()
      - pattern-not: Cookie::build(...). ... .secure(true). ... .finish()

  # Cookie with SameSite None but no Secure flag
  - id: rust-cookie-samesite-none
    languages: [rust]
    severity: WARNING
    message: >
      Cookie with SameSite=None must also set Secure flag. Browsers reject
      SameSite=None cookies without Secure.
    metadata:
      confidence: HIGH
      category: security
      cwe:
        - "CWE-1275: Sensitive Cookie with Improper SameSite Attribute"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      technology:
        - rust
      likelihood: HIGH
      impact: MEDIUM
      subcategory:
        - vuln
      references:
        - https://owasp.org/Top10/A05_2021-Security_Misconfiguration/
    patterns:
      - pattern: $COOKIE. ... .same_site(SameSite::None). ... .finish()
      - pattern-not: $COOKIE. ... .secure(true). ... .finish()
