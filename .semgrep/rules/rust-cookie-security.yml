rules:
  # Cookie::new() without builder — can't set Secure flag via chaining
  - id: rust-cookie-new-audit
    languages: [rust]
    severity: WARNING
    message: >
      Cookie::new() creates a cookie without security attributes. Use
      Cookie::build() with .secure(true) and .http_only(true) instead, or
      call .set_secure(true) on the returned cookie.
    metadata:
      confidence: MEDIUM
      category: security
      cwe:
        - "CWE-614: Sensitive Cookie in HTTPS Session Without 'Secure' Attribute"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      technology:
        - rust
      likelihood: MEDIUM
      impact: MEDIUM
      subcategory:
        - audit
      references:
        - https://owasp.org/Top10/A05_2021-Security_Misconfiguration/
    pattern: Cookie::new(...)

  # Cookie::build() chain missing .secure(true) — regex-based because
  # Semgrep AST matching doesn't support method chain ellipsis in Rust
  - id: rust-cookie-build-missing-secure
    languages: [rust]
    severity: WARNING
    message: >
      Cookie built without .secure(true). Set .secure(true) to prevent
      transmission over unencrypted connections, and .http_only(true) to
      prevent JavaScript access.
    metadata:
      confidence: MEDIUM
      category: security
      cwe:
        - "CWE-614: Sensitive Cookie in HTTPS Session Without 'Secure' Attribute"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      technology:
        - rust
      likelihood: MEDIUM
      impact: MEDIUM
      subcategory:
        - audit
      references:
        - https://owasp.org/Top10/A05_2021-Security_Misconfiguration/
    patterns:
      - pattern-regex: 'Cookie::build\([^;]*(?:\.finish|\.build)\(\)'
      - pattern-not-regex: '\.secure\(true\)'
