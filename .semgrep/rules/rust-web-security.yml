rules:
  # CORS permissive — both imported and fully-qualified
  - id: rust-cors-permissive
    languages: [rust]
    severity: WARNING
    message: >
      Cors::permissive() allows requests from any origin, effectively
      disabling the same-origin policy. Restrict to trusted origins.
    metadata:
      confidence: HIGH
      category: security
      cwe:
        - "CWE-942: Permissive Cross-domain Policy with Untrusted Domains"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      technology:
        - rust
        - actix-cors
      likelihood: HIGH
      impact: MEDIUM
      subcategory:
        - vuln
      references:
        - https://owasp.org/Top10/A05_2021-Security_Misconfiguration/
    pattern-either:
      - pattern: Cors::permissive()
      - pattern: actix_cors::Cors::permissive()

  - id: rust-cors-wildcard-origin
    languages: [rust]
    severity: WARNING
    message: >
      Wildcard CORS origin allows any website to make cross-origin
      requests. Restrict to specific trusted origins.
    metadata:
      confidence: HIGH
      category: security
      cwe:
        - "CWE-942: Permissive Cross-domain Policy with Untrusted Domains"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      technology:
        - rust
        - actix-cors
      likelihood: HIGH
      impact: MEDIUM
      subcategory:
        - vuln
      references:
        - https://owasp.org/Top10/A05_2021-Security_Misconfiguration/
    pattern: $CORS.allowed_origin("*")

  # NOTE: Open redirect taint rule removed — Semgrep cannot parse
  # web::Query<$TYPE> as a Rust taint source. Pattern fallback below.

  # Open redirect — pattern-based
  - id: rust-open-redirect-pattern
    languages: [rust]
    severity: WARNING
    message: >
      HTTP redirect with variable Location header. If user-controlled,
      this allows open redirect attacks. Validate against an allowlist.
    metadata:
      confidence: LOW
      category: security
      cwe:
        - "CWE-601: URL Redirection to Untrusted Site ('Open Redirect')"
      owasp:
        - "A01:2021 - Broken Access Control"
      technology:
        - rust
        - actix-web
      likelihood: LOW
      impact: MEDIUM
      subcategory:
        - audit
      references:
        - https://owasp.org/Top10/A01_2021-Broken_Access_Control/
    patterns:
      - pattern-either:
          - pattern: |
              HttpResponse::Found()
                .insert_header(("Location", $VAR))
          - pattern: |
              HttpResponse::TemporaryRedirect()
                .insert_header(("Location", $VAR))
          - pattern: |
              HttpResponse::SeeOther()
                .insert_header(("Location", $VAR))
      - pattern-not: |
          HttpResponse::Found()
            .insert_header(("Location", "..."))
      - pattern-not: |
          HttpResponse::TemporaryRedirect()
            .insert_header(("Location", "..."))

  # Error information disclosure
  - id: rust-error-info-disclosure
    languages: [rust]
    severity: WARNING
    message: >
      Internal error details exposed in HTTP response. Return generic
      error messages to users and log details server-side instead.
    metadata:
      confidence: MEDIUM
      category: security
      cwe:
        - "CWE-209: Generation of Error Message Containing Sensitive Information"
      owasp:
        - "A04:2021 - Insecure Design"
      technology:
        - rust
        - actix-web
      likelihood: MEDIUM
      impact: LOW
      subcategory:
        - vuln
      references:
        - https://owasp.org/Top10/A04_2021-Insecure_Design/
    pattern-either:
      - pattern: HttpResponse::InternalServerError().body(format!(...))
      - pattern: HttpResponse::BadGateway().body(format!(...))
