rules:
  # Cleartext storage of passwords/secrets in database INSERT/UPDATE queries
  - id: rust-cleartext-db-storage-rusqlite
    languages: [rust]
    severity: ERROR
    message: >
      Sensitive data (password, secret, token) is stored in the database
      without encryption or hashing. Always hash passwords with bcrypt/argon2
      and encrypt secrets before storing them in a database.
    metadata:
      confidence: MEDIUM
      category: security
      cwe:
        - "CWE-312: Cleartext Storage of Sensitive Information"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      technology:
        - rust
        - rusqlite
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
      references:
        - https://owasp.org/Top10/A02_2021-Cryptographic_Failures/
        - https://cwe.mitre.org/data/definitions/312.html
    pattern-regex: '\.execute\s*\(\s*&?format!\s*\(\s*"[^"]*(?i)(INSERT|UPDATE)[^"]*(?i)(password|secret|token|credential|api.key)[^"]*"'

