rules:
  # Database connection strings with embedded credentials
  - id: rust-hardcoded-db-credentials
    languages: [rust]
    severity: ERROR
    message: >
      Hardcoded database connection string with credentials detected.
      Use environment variables or a secrets manager instead.
    metadata:
      confidence: HIGH
      category: security
    pattern-regex: '"(postgres|postgresql|mysql|mongodb|redis|amqp)://[^"]*:[^"]*@[^"]*"'

  # Private keys
  - id: rust-hardcoded-private-key
    languages: [rust]
    severity: ERROR
    message: >
      Hardcoded private key detected. Private keys must never be
      committed to source code. Use a secrets manager or environment
      variables.
    metadata:
      confidence: HIGH
      category: security
    pattern-regex: '"-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'

  # API key / token patterns
  - id: rust-hardcoded-api-key
    languages: [rust]
    severity: WARNING
    message: >
      Possible hardcoded API key or token detected. Use environment
      variables or a secrets manager instead of embedding secrets in
      source code.
    metadata:
      confidence: LOW
      category: security
    pattern-regex: '(?i)(api_key|apikey|secret_key|auth_token)\s*[:=]\s*"[a-zA-Z0-9_\-]{16,}"'
