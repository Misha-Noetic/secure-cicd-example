rules:
  - id: rust-non-https-url-literal
    languages: [rust]
    severity: WARNING
    message: >
      HTTP URL literal detected. Use HTTPS for all network communication
      to prevent data interception. Change http:// to https://.
    metadata:
      confidence: MEDIUM
      category: security
      cwe:
        - "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      technology:
        - rust
      likelihood: MEDIUM
      impact: MEDIUM
      subcategory:
        - audit
      references:
        - https://owasp.org/Top10/A02_2021-Cryptographic_Failures/
    pattern-regex: '"http://[a-zA-Z0-9][^"]*"'
