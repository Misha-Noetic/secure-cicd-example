rules:
  # Disabled signature validation — allows forged tokens
  - id: rust-jwt-insecure-validation
    languages: [rust]
    severity: ERROR
    message: >
      JWT signature validation is disabled. This allows attackers to forge
      tokens with arbitrary claims. Never call
      insecure_disable_signature_validation() in production code.
    metadata:
      confidence: HIGH
      category: security
      cwe:
        - "CWE-347: Improper Verification of Cryptographic Signature"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      technology:
        - rust
        - jsonwebtoken
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
      references:
        - https://owasp.org/Top10/A02_2021-Cryptographic_Failures/
    pattern: $VALIDATION.insecure_disable_signature_validation()

  # Disabled expiration validation
  - id: rust-jwt-disabled-exp
    languages: [rust]
    severity: ERROR
    message: >
      JWT expiration validation is disabled. This allows expired tokens
      to be accepted indefinitely. Keep validate_exp set to true (the
      default).
    metadata:
      confidence: HIGH
      category: security
      cwe:
        - "CWE-613: Insufficient Session Expiration"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      technology:
        - rust
        - jsonwebtoken
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
    pattern: $VALIDATION.validate_exp = false

  # Legacy API — dangerous_insecure_decode (removed in jsonwebtoken 8+,
  # but kept for scanning older codebases)
  - id: rust-jwt-insecure-decode
    languages: [rust]
    severity: ERROR
    message: >
      dangerous_insecure_decode() skips JWT signature verification. An
      attacker can forge tokens with arbitrary claims. Use decode() with
      proper key and validation instead.
    metadata:
      confidence: HIGH
      category: security
      cwe:
        - "CWE-347: Improper Verification of Cryptographic Signature"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      technology:
        - rust
        - jsonwebtoken
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
    pattern-either:
      - pattern: jsonwebtoken::dangerous_insecure_decode(...)
      - pattern: jsonwebtoken::dangerous_insecure_decode::<$TYPE>(...)
      - pattern: dangerous_insecure_decode(...)
      - pattern: dangerous_insecure_decode::<$TYPE>(...)
