rules:
  # Sensitive data written to a raw TcpStream (no TLS)
  - id: rust-cleartext-transmission-tcp-write
    languages: [rust]
    severity: ERROR
    message: >
      Sensitive data (password, secret, token) is transmitted over an
      unencrypted TCP connection. Use TLS (e.g., rustls or native-tls)
      to encrypt data in transit. Never send credentials over plain TCP.
    metadata:
      confidence: MEDIUM
      category: security
      cwe:
        - "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      technology:
        - rust
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
      references:
        - https://owasp.org/Top10/A02_2021-Cryptographic_Failures/
        - https://cwe.mitre.org/data/definitions/319.html
    pattern-regex: '(?:write_all|write)\s*\(\s*[^)]*(?i)(password|secret|token|credential|api.key)'

  # Sensitive data sent via HTTP (not HTTPS) using reqwest
  - id: rust-cleartext-transmission-http-sensitive
    languages: [rust]
    severity: ERROR
    message: >
      Sensitive data is sent over an HTTP (non-HTTPS) connection. Use HTTPS
      to encrypt data in transit. Cleartext HTTP exposes credentials and
      tokens to network eavesdroppers.
    metadata:
      confidence: MEDIUM
      category: security
      cwe:
        - "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      technology:
        - rust
        - reqwest
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
      references:
        - https://owasp.org/Top10/A02_2021-Cryptographic_Failures/
    pattern-regex: '\.(?:post|put|patch)\s*\(\s*"http://[^"]*"\s*\)[^;]*(?i)(password|secret|token|credential|api.key)'
