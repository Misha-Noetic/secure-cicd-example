rules:
  # todo!() and unimplemented!() left in code
  - id: rust-todo-in-code
    languages: [rust]
    severity: ERROR
    message: >
      todo!() macro found. This panics at runtime and must not be present
      in production code. Implement the missing functionality or remove
      the endpoint.
    metadata:
      confidence: HIGH
      category: security
      cwe:
        - "CWE-248: Uncaught Exception"
      technology:
        - rust
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - audit
      references:
        - https://owasp.org/www-community/vulnerabilities/Poor_Error_Handling
    pattern: todo!(...)

  - id: rust-unimplemented-in-code
    languages: [rust]
    severity: ERROR
    message: >
      unimplemented!() macro found. This panics at runtime and must not
      be present in production code. Implement the missing functionality
      or return an appropriate error.
    metadata:
      confidence: HIGH
      category: security
      cwe:
        - "CWE-248: Uncaught Exception"
      technology:
        - rust
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - audit
      references:
        - https://owasp.org/www-community/vulnerabilities/Poor_Error_Handling
    pattern: unimplemented!(...)

  # .unwrap() inside async web handler — can crash the server
  - id: rust-unwrap-in-handler
    languages: [rust]
    severity: WARNING
    message: >
      .unwrap() used in a web handler. This panics on None/Err values
      and will crash the request handler. Use the ? operator or
      match/if-let for proper error handling.
    metadata:
      confidence: LOW
      category: security
      cwe:
        - "CWE-248: Uncaught Exception"
      technology:
        - rust
        - actix-web
      likelihood: LOW
      impact: MEDIUM
      subcategory:
        - audit
      references:
        - https://owasp.org/www-community/vulnerabilities/Poor_Error_Handling
    patterns:
      - pattern: $EXPR.unwrap()
      - pattern-inside: |
          pub async fn $FN(...) -> impl Responder {
            ...
          }
