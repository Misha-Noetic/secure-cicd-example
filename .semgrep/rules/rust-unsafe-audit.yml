rules:
  - id: rust-unsafe-block-audit
    languages: [rust]
    severity: INFO
    message: >
      Unsafe block detected. Ensure this has a // SAFETY: comment explaining
      why the unsafe code is sound. All unsafe blocks should be minimized
      and thoroughly reviewed.
    metadata:
      confidence: HIGH
      category: security
      cwe:
        - "CWE-119: Improper Restriction of Operations within the Bounds of a Memory Buffer"
      owasp:
        - "A06:2021 - Vulnerable and Outdated Components"
      technology:
        - rust
      likelihood: LOW
      impact: HIGH
      subcategory:
        - audit
      references:
        - https://doc.rust-lang.org/book/ch19-01-unsafe-rust.html
    pattern: |
      unsafe { ... }
